<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>bolt.diy — AI Code Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#05050d;min-height:100vh;font-family:'Syne',sans-serif;color:#ccc;display:flex;flex-direction:column}
/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid #1a1a2e;background:#08080f;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:2px;cursor:pointer}
.logo-bolt{font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo-icon{font-size:20px;color:#a855f7}
.logo-diy{font-size:24px;font-weight:800;color:#a855f7;letter-spacing:-1px}
.hbtn{background:#18182a;border:1px solid #2a2a3e;color:#888;border-radius:8px;padding:7px 14px;font-size:12px;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s}
.hbtn:hover{border-color:#a855f7;color:#ccc}
/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden}
/* ── SIDEBAR ── */
.sidebar{width:260px;background:#08080f;border-right:1px solid #1a1a2e;display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;transition:width .3s}
.sidebar.collapsed{width:0;padding:0;overflow:hidden}
.sidebar-title{font-size:11px;color:#444;padding:0 18px 10px;text-transform:uppercase;letter-spacing:1px}
.feat-list{display:flex;flex-direction:column;gap:2px;padding:0 10px}
.feat{display:flex;align-items:center;gap:10px;font-size:13px;color:#666;padding:8px 10px;border-radius:8px;cursor:default;transition:all .2s}
.feat:hover{background:#14141f;color:#bbb}
.dot{width:5px;height:5px;border-radius:50%;background:#a855f7;flex-shrink:0}
.sidebar-divider{border:none;border-top:1px solid #1a1a2e;margin:16px 10px}
.badge{background:#1a0a2e;color:#a855f7;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid #2e1a4e}
/* ── CONFIG ── */
.config-section{padding:12px 18px}
.cfg-label{font-size:11px;color:#444;margin-bottom:6px}
.sel{width:100%;background:#0e0e1a;border:1px solid #1e1e2e;color:#bbb;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Syne',sans-serif;cursor:pointer;outline:none;appearance:none;transition:border-color .2s;margin-bottom:8px}
.sel:focus{border-color:#a855f7}
.key-input-wrap{position:relative;display:flex;align-items:center;gap:6px}
.key-input{flex:1;background:#0e0e1a;border:1px solid #1e1e2e;color:#bbb;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s}
.key-input:focus{border-color:#a855f7}
.key-toggle{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:4px;transition:color .2s}
.key-toggle:hover{color:#a855f7}
.get-key{display:block;font-size:11px;color:#a855f7;text-decoration:none;margin-top:5px;transition:opacity .2s}
.get-key:hover{opacity:.7}
/* ── CHAT AREA ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:18px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}
/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;text-align:center;padding:40px 20px}
.welcome-logo{font-size:52px;font-weight:800;letter-spacing:-2px}
.welcome-logo span{color:#a855f7}
.welcome-sub{font-size:14px;color:#444;max-width:400px;line-height:1.6}
.examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.ex-btn{background:#0e0e1a;border:1px solid #1e1e2e;color:#666;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-family:'Syne',sans-serif;transition:all .2s}
.ex-btn:hover{border-color:#a855f7;color:#ccc;background:#14141f}
/* ── MESSAGES ── */
.msg{display:flex;gap:12px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid #2a2a3e}
.avatar.ai{background:#1a0a2e;border-color:#a855f7}
.avatar.user-av{background:#18182a}
.bubble{max-width:72%;background:#0e0e1a;border:1px solid #1e1e2e;border-radius:14px;padding:12px 16px;font-size:13px;line-height:1.7;color:#ccc}
.msg.user .bubble{background:#1a0a2e;border-color:#3a1a5e;color:#d8b4fe}
.bubble pre{background:#0a0a12;border:1px solid #1a1a2e;border-radius:8px;padding:12px;overflow-x:auto;margin:10px 0}
.bubble code{font-family:'JetBrains Mono',monospace;font-size:12px;color:#c9b9ff}
.bubble p{margin-bottom:8px}
.bubble p:last-child{margin-bottom:0}
/* ── TYPING ── */
.typing .bubble{display:flex;align-items:center;gap:5px;padding:14px 18px}
.tdot{width:7px;height:7px;border-radius:50%;background:#a855f7;animation:bounce .8s infinite}
.tdot:nth-child(2){animation-delay:.15s}
.tdot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
/* ── INPUT ── */
.input-bar{background:#08080f;border-top:1px solid #1a1a2e;padding:16px 32px}
.input-card{background:#0e0e1a;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden;transition:border-color .2s}
.input-card:focus-within{border-color:#a855f7}
.textarea{background:transparent;border:none;width:100%;padding:14px 16px;color:#ccc;font-size:13px;font-family:'JetBrains Mono',monospace;resize:none;outline:none;min-height:64px;max-height:200px;line-height:1.7}
.textarea::placeholder{color:#2e2e3e}
.toolbar{display:flex;align-items:center;gap:4px;padding:8px 12px;border-top:1px solid #1a1a2e}
.tbtn{background:none;border:none;color:#444;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:15px;transition:all .2s}
.tbtn:hover{color:#a855f7;background:#14141f}
.send-btn{background:#a855f7;border:none;color:#fff;border-radius:8px;padding:7px 18px;cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;font-weight:700;margin-left:auto;transition:all .2s;display:flex;align-items:center;gap:6px}
.send-btn:hover{background:#9333ea}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{background:#2a2a3e;color:#555;cursor:not-allowed;transform:none}
.char-count{font-size:11px;color:#333;margin-right:8px}
/* ── ERROR ── */
.error-msg{background:#1a0808;border:1px solid #3e1a1a;border-radius:10px;padding:10px 14px;font-size:12px;color:#f87171;margin:0 32px 12px}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a0a2e;border:1px solid #a855f7;color:#d8b4fe;font-size:13px;font-family:'Syne',sans-serif;padding:10px 24px;border-radius:10px;transition:transform .35s ease;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ── MOBILE ── */
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;width:260px;transform:translateX(-100%);transition:transform .3s}
  .sidebar.mobile-open{transform:translateX(0)}
  .messages{padding:16px}
  .input-bar{padding:12px 16px}
  .bubble{max-width:90%}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="toggleSidebar()">
    <span class="logo-bolt">bolt</span><span class="logo-icon">⚡</span><span class="logo-diy">diy</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#333;display:inline-block;transition:background .3s"></span>
    <span id="status-text" style="font-size:11px;color:#444">Не подключено</span>
    <button class="hbtn" onclick="clearChat()">Очистить чат</button>
    <button class="hbtn" id="mobile-menu" onclick="toggleMobileSidebar()">☰ Настройки</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Возможности</div>
    <div class="feat-list">
      <div class="feat"><div class="dot"></div>Несколько LLM провайдеров</div>
      <div class="feat"><div class="dot"></div>История чата</div>
      <div class="feat"><div class="dot"></div>Подсветка кода</div>
      <div class="feat"><div class="dot"></div>Поддержка Markdown</div>
      <div class="feat"><div class="dot"></div>Копирование ответов</div>
      <div class="feat"><div class="dot" style="background:#7c3aed"></div>Активное сообщество <span class="badge">NEW</span></div>
    </div>

    <hr class="sidebar-divider"/>

    <div class="config-section">
      <div class="cfg-label">Провайдер</div>
      <select class="sel" id="provider" onchange="updateModels()">
        <option value="google">Google (Gemini)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="groq">Groq (быстрый)</option>
        <option value="openrouter">OpenRouter</option>
      </select>

      <div class="cfg-label">Модель</div>
      <select class="sel" id="model"></select>

      <div class="cfg-label" style="margin-top:12px">API Ключ</div>
      <div class="key-input-wrap">
        <input type="password" class="key-input" id="apiKey" placeholder="Вставь ключ сюда..." oninput="updateStatus()"/>
        <button class="key-toggle" onclick="toggleKey()" title="Показать/скрыть">👁</button>
      </div>
      <a href="#" class="get-key" id="getKeyLink" target="_blank">Получить API ключ ↗</a>

      <div class="cfg-label" style="margin-top:12px">Системный промпт</div>
      <textarea class="sel" id="systemPrompt" style="resize:vertical;min-height:60px;padding:8px" placeholder="Ты — опытный разработчик...">Ты — опытный разработчик и ассистент. Отвечай на русском языке. При написании кода используй блоки ``` с указанием языка. Давай подробные, чёткие объяснения.</textarea>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">bolt<span>⚡</span>diy</div>
        <p class="welcome-sub">Настрой провайдера и API ключ в боковой панели — и начни разговор</p>
        <div class="examples">
          <button class="ex-btn" onclick="setExample(this)">Создай Todo App на HTML/JS</button>
          <button class="ex-btn" onclick="setExample(this)">Напиши REST API на Python Flask</button>
          <button class="ex-btn" onclick="setExample(this)">Объясни как работает async/await</button>
          <button class="ex-btn" onclick="setExample(this)">Создай красивую landing page</button>
          <button class="ex-btn" onclick="setExample(this)">Напиши сортировку пузырьком</button>
        </div>
      </div>
    </div>

    <div id="error-area"></div>

    <div class="input-bar">
      <div class="input-card">
        <textarea class="textarea" id="mainInput" placeholder="Что создадим сегодня? (Enter — отправить, Shift+Enter — новая строка)" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="toolbar">
          <button class="tbtn" title="Очистить" onclick="document.getElementById('mainInput').value='';autoResize(document.getElementById('mainInput'))">🗑</button>
          <span class="char-count" id="charCount">0</span>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <span>Отправить</span> <span>↗</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MODELS = {
  google: [
    {v:'gemini-2.0-flash-exp',     l:'Gemini 2.0 Flash (exp)'},
    {v:'gemini-1.5-pro-002',       l:'Gemini 1.5 Pro-002'},
    {v:'gemini-1.5-flash-002',     l:'Gemini 1.5 Flash-002'},
    {v:'gemini-1.5-flash-8b',      l:'Gemini 1.5 Flash 8B'},
  ],
  openai: [
    {v:'gpt-4o',          l:'GPT-4o'},
    {v:'gpt-4o-mini',     l:'GPT-4o mini'},
    {v:'gpt-4-turbo',     l:'GPT-4 Turbo'},
    {v:'gpt-3.5-turbo',   l:'GPT-3.5 Turbo'},
    {v:'o1-mini',         l:'o1-mini'},
  ],
  anthropic: [
    {v:'claude-3-5-sonnet-20241022', l:'Claude 3.5 Sonnet'},
    {v:'claude-3-5-haiku-20241022',  l:'Claude 3.5 Haiku'},
    {v:'claude-3-opus-20240229',     l:'Claude 3 Opus'},
    {v:'claude-3-haiku-20240307',    l:'Claude 3 Haiku'},
  ],
  groq: [
    {v:'llama-3.3-70b-versatile',   l:'Llama 3.3 70B'},
    {v:'llama-3.1-8b-instant',      l:'Llama 3.1 8B (Fast)'},
    {v:'mixtral-8x7b-32768',        l:'Mixtral 8x7B'},
    {v:'gemma2-9b-it',              l:'Gemma 2 9B'},
  ],
  openrouter: [
    {v:'meta-llama/llama-3.3-70b-instruct:free', l:'Llama 3.3 70B (Free)'},
    {v:'google/gemini-flash-1.5',                l:'Gemini 1.5 Flash'},
    {v:'anthropic/claude-3-haiku',               l:'Claude 3 Haiku'},
    {v:'mistralai/mistral-7b-instruct:free',     l:'Mistral 7B (Free)'},
  ],
};

const KEY_LINKS = {
  google:     'https://aistudio.google.com/app/apikey',
  openai:     'https://platform.openai.com/api-keys',
  anthropic:  'https://console.anthropic.com/settings/keys',
  groq:       'https://console.groq.com/keys',
  openrouter: 'https://openrouter.ai/keys',
};

let history = [];
let isLoading = false;

// ── Init ──
function updateModels() {
  const p = document.getElementById('provider').value;
  const sel = document.getElementById('model');
  sel.innerHTML = MODELS[p].map(m => `<option value="${m.v}">${m.l}</option>`).join('');
  document.getElementById('getKeyLink').href = KEY_LINKS[p] || '#';
  document.getElementById('apiKey').value = localStorage.getItem('key_' + p) || '';
  updateStatus();
}

function updateStatus() {
  const key = document.getElementById('apiKey').value.trim();
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (key.length > 8) {
    dot.style.background = '#22c55e';
    txt.style.color = '#22c55e';
    txt.textContent = 'Подключено';
    const p = document.getElementById('provider').value;
    localStorage.setItem('key_' + p, key);
  } else {
    dot.style.background = '#ef4444';
    txt.style.color = '#ef4444';
    txt.textContent = key ? 'Ключ слишком короткий' : 'Нет ключа';
  }
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

updateModels();

// ── Send ──
async function sendMessage() {
  const input = document.getElementById('mainInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  const key = document.getElementById('apiKey').value.trim();
  if (!key) {
    showError('⚠️ Введи API ключ в боковой панели!');
    return;
  }

  hideError();
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  autoResize(input);
  updateCharCount('');

  setLoading(true);
  showTyping();

  try {
    const provider = document.getElementById('provider').value;
    const model    = document.getElementById('model').value;
    const sysPrompt = document.getElementById('systemPrompt').value.trim();
    const reply = await callAPI(provider, model, key, sysPrompt, history);
    removeTyping();
    addMessage('ai', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    showError('❌ Ошибка: ' + err.message);
  } finally {
    setLoading(false);
  }
}

// ── API Router ──
async function callAPI(provider, model, key, sysPrompt, msgs) {
  switch(provider) {
    case 'google':    return callGoogle(model, key, sysPrompt, msgs);
    case 'openai':    return callOpenAI('https://api.openai.com/v1/chat/completions', model, key, sysPrompt, msgs);
    case 'anthropic': return callAnthropic(model, key, sysPrompt, msgs);
    case 'groq':      return callOpenAI('https://api.groq.com/openai/v1/chat/completions', model, key, sysPrompt, msgs);
    case 'openrouter':return callOpenAI('https://openrouter.ai/api/v1/chat/completions', model, key, sysPrompt, msgs);
    default: throw new Error('Неизвестный провайдер');
  }
}

async function callGoogle(model, key, sysPrompt, msgs) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const contents = msgs.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const body = { contents };
  if (sysPrompt) body.system_instruction = { parts: [{ text: sysPrompt }] };

  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || r.statusText);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || '(пустой ответ)';
}

async function callOpenAI(url, model, key, sysPrompt, msgs) {
  const messages = [];
  if (sysPrompt) messages.push({ role: 'system', content: sysPrompt });
  msgs.forEach(m => messages.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }));

  const r = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
      'HTTP-Referer': window.location.href,
      'X-Title': 'bolt.diy'
    },
    body: JSON.stringify({ model, messages, max_tokens: 4096 })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || r.statusText);
  return d.choices?.[0]?.message?.content || '(пустой ответ)';
}

async function callAnthropic(model, key, sysPrompt, msgs) {
  const messages = msgs.map(m => ({
    role: m.role === 'assistant' ? 'assistant' : 'user',
    content: m.content
  }));
  const body = { model, max_tokens: 4096, messages };
  if (sysPrompt) body.system = sysPrompt;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || r.statusText);
  return d.content?.[0]?.text || '(пустой ответ)';
}

// ── UI Helpers ──
function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (role === 'ai' ? 'ai' : 'user-av');
  avatar.textContent = role === 'ai' ? '⚡' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  if (role === 'ai') {
    const copyBtn = document.createElement('button');
    copyBtn.style.cssText = 'background:none;border:none;color:#555;cursor:pointer;font-size:11px;padding:4px 0 0;display:block;transition:color .2s';
    copyBtn.textContent = '📋 Копировать';
    copyBtn.onmouseover = () => copyBtn.style.color = '#a855f7';
    copyBtn.onmouseout  = () => copyBtn.style.color = '#555';
    copyBtn.onclick = () => { navigator.clipboard.writeText(text); showToast('✅ Скопировано!'); };
    bubble.appendChild(copyBtn);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatText(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code${lang?' data-lang="'+lang+'"':''}>${escHtml(code.trim())}</code></pre>`
  );
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Paragraphs
  text = text.split(/\n\n+/).map(p => {
    if (p.startsWith('<pre>')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  return text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar ai">⚡</div><div class="bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setLoading(val) {
  isLoading = val;
  const btn = document.getElementById('sendBtn');
  btn.disabled = val;
  btn.innerHTML = val ? '<span>Генерация...</span>' : '<span>Отправить</span> <span>↗</span>';
}

function showError(msg) {
  document.getElementById('error-area').innerHTML = `<div class="error-msg">${msg}</div>`;
}
function hideError() {
  document.getElementById('error-area').innerHTML = '';
}

function clearChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div class="welcome" id="welcome">
    <div class="welcome-logo">bolt<span>⚡</span>diy</div>
    <p class="welcome-sub">Настрой провайдера и API ключ в боковой панели — и начни разговор</p>
    <div class="examples">
      <button class="ex-btn" onclick="setExample(this)">Создай Todo App на HTML/JS</button>
      <button class="ex-btn" onclick="setExample(this)">Напиши REST API на Python Flask</button>
      <button class="ex-btn" onclick="setExample(this)">Объясни как работает async/await</button>
      <button class="ex-btn" onclick="setExample(this)">Создай красивую landing page</button>
    </div>
  </div>`;
  showToast('🗑 Чат очищен');
}

function setExample(btn) {
  document.getElementById('mainInput').value = btn.textContent;
  document.getElementById('mainInput').focus();
}

function handleKey(e) {
  updateCharCount(e.target.value);
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function updateCharCount(v) {
  document.getElementById('charCount').textContent = v.length > 0 ? v.length : '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  updateCharCount(el.value);
}

let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
